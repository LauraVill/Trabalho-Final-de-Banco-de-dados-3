<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <!-- Ajusta a página para dispositivos móveis -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Catálogo de Filmes</title>

  <!-- Arquivo de estilização -->
  <link rel="stylesheet" href="style.css" />

  <!-- Fonte utilizada no sistema -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Cabeçalho da aplicação -->
  <header class="header">
    <h1>Catálogo de Filmes e Séries</h1>

    <!-- Descreve as tecnologias utilizadas -->
    <p>API REST com MongoDB, Node.js e Aggregation Framework</p>
  </header>

  <!-- Menu de navegação -->
  <nav class="menu">

    <!-- Consome a rota GET /filmes (READ do CRUD) -->
    <button onclick="carregarFilmes()">Filmes</button>

    <!-- Relatórios gerados através de Aggregation Framework -->
    <button onclick="carregarRelatorio('/relatorios/media-avaliacoes')">
      Média de Avaliações
    </button>

    <button onclick="carregarRelatorio('/relatorios/filmes-por-genero')">
      Filmes por Gênero
    </button>

    <button onclick="carregarRelatorio('/relatorios/filmes-por-diretor')">
      Filmes por Diretor
    </button>

    <button onclick="carregarRelatorio('/relatorios/top5-avaliados')">
      Top 5 Avaliados
    </button>

  </nav>

  <!-- Área onde os dados retornados pela API serão exibidos -->
  <main class="container">
    <section id="resultado" class="cards">

      <!-- Mensagem inicial da aplicação -->
      <div class="card destaque">
        <h2>Bem-vinda!</h2>
        <p>Escolha uma opção acima para visualizar os dados do catálogo.</p>
      </div>

    </section>
  </main>

  <!-- Rodapé -->
  <footer>
    Trabalho Final de Banco de Dados 3
  </footer>

  <!-- Arquivo JavaScript responsável por consumir a API -->
  <script src="app.js"></script>

</body>

</html>
